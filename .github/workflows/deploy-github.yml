name: Deploy WebCICDGrade

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore WebCICDGrade.sln

      - name: Run tests
        run: dotnet test WebCICDGrade.sln -c Release

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore WebCICDGrade.sln

      - name: Build project
        run: dotnet build WebCICDGrade.sln -c Release --no-restore

      - name: Publish project
        run: dotnet publish WebCICDGrade.sln -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebCICDGrade-files
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WebCICDGrade artifact
        uses: actions/download-artifact@v4
        with:
          name: WebCICDGrade-files
          path: ./deploy

      - name: Deploy to server via SSH
        run: |
          echo "Starting deployment..."
          scp -r ./deploy/* user@your-server:/path/to/deploy
          echo "Deploying completed!"
        
      - name: Deploy to production (Optional: Using URL for Deployment)
        run: |
          echo "Deployment URL: http://your-server-address.com"
          curl -X POST http://your-server-address.com/deploy
          echo "Deployment complete!"

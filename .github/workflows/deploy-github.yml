name: Deploy Dist

on:
  push:
    branches:
      - main
    paths-ignore:
      #- '.github/workflows/*'
      - 'README.md'
  workflow_dispatch:
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WebCICDGrade.sln

      - name: Test
        run: dotnet test WebCICDGrade.sln -c Release

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WebCICDGrade.sln

      - name: Build
        run: dotnet build WebCICDGrade.sln -c Release --no-restore

      - name: Upload GitHub Pages artifact
       uses: actions/upload-pages-artifact@v4.0.0
  with:
    # Artifact name
    name: # optional, default is github-pages
    # Path of the directory containing the static assets.
    path: # default is _site/
    # Duration after which artifact will expire in days.
    retention-days: # optional, default is 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download WebCICDGrade Artifact
        uses: actions/download-artifact@v4
        with:
          name: WebCICDGrade-files
          path: .

      - name: Deploy
        run: echo "Deploy successful"
